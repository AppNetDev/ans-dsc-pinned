$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: InstallOfficeWordExcelOutlook
    type: AppNetOnline.Pinned/App
    properties:
      Ensure: Present
      Name: Microsoft 365 Apps for enterprise
      InstallerPath: https://officecdn.microsoft.com/pr/wsus/setup.exe
      Version: "16.0.19929.20090"
      Arguments: /configure Office-WordExcelOutlook.xml
      WorkingDirectory: C:\ANS\Installers\Office
      PreAction: Get-AppxPackage -AllUsers -Name Microsoft.MicrosoftOfficeHub -ErrorAction SilentlyContinue | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue; Get-AppxProvisionedPackage -Online | Where-Object { $_.DisplayName -eq 'Microsoft.MicrosoftOfficeHub' } | Remove-AppxProvisionedPackage -Online -AllUsers -ErrorAction SilentlyContinue | Out-Null; if (-not (Test-Path 'C:\ANS\Installers\Office')) { New-Item -Path 'C:\ANS\Installers\Office' -ItemType Directory -Force | Out-Null }; Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/AppNetDev/ans-dsc-pinned/master/.configurations/resources/Office-WordExcelOutlook.xml' -OutFile 'C:\ANS\Installers\Office\Office-WordExcelOutlook.xml' -UseBasicParsing
      PatchOnly: false
