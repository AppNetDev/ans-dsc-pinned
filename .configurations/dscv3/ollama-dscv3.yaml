$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: InstallOllama
    type: AppNetOnline.Pinned/App
    properties:
      Ensure: Present
      Name: Ollama version 0.24.0
      InstallerPath: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
      InstalledCheckFilePath: C:\Program Files\Ollama\ollama.exe
      Version: latest
      Arguments: -NoProfile -ExecutionPolicy Bypass -Command "$env:OLLAMA_INSTALL_DIR='C:\Program Files\Ollama'; irm https://ollama.com/install.ps1 | iex"
      PostAction: Stop-Process -Name 'ollama app','ollama' -Force -ErrorAction SilentlyContinue
      PatchOnly: false
