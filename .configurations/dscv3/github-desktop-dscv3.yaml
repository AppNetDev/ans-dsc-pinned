$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: InstallGitHubDesktop
    type: AppNetOnline.Pinned/App
    properties:
      Ensure: Present
      Name: GitHub Desktop
      InstallerPath: https://central.github.com/deployments/desktop/desktop/latest/win32?format=msi
      Version: Latest
      Arguments: /qn /norestart
      PatchOnly: false