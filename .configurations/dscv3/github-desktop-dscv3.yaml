$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: InstallGitHubDesktop
    type: AppNetOnline.Pinned/App
    properties:
      Ensure: Present
      Name: GitHub Desktop
      InstallerPath: https://github.com/desktop/desktop/releases/latest/download/GitHubDesktopSetup-x64.msi
      InstalledCheckFilePath: C:\Program Files\GitHub Desktop\GitHubDesktop.exe
      Version: latest
      Arguments: /qn /norestart
      PostAction: '& "$env:ProgramFiles\GitHub Desktop Deployment\GitHubDesktopDeploymentTool.exe" -s'
      PatchOnly: false
