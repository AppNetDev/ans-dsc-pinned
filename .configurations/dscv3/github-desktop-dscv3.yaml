$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: InstallGitHubDesktopDeploymentTool
    type: AppNetOnline.Pinned/App
    properties:
      Ensure: Present
      Name: GitHub Desktop Deployment Tool
      InstallerPath: https://github.com/desktop/desktop/releases/latest/download/GitHubDesktopSetup-x64.msi
      InstalledCheckScript: Test-Path -LiteralPath 'C:\Program Files\GitHub Desktop Deployment\GitHubDesktopDeploymentTool.exe'
      Version: latest
      Arguments: /qn /norestart
      PatchOnly: false

  - name: StageGitHubDesktop
    type: AppNetOnline.Pinned/App
    dependsOn:
      - "[resourceId('AppNetOnline.Pinned/App','InstallGitHubDesktopDeploymentTool')]"
    properties:
      Ensure: Present
      Name: GitHub Desktop
      InstallerPath: C:\Program Files\GitHub Desktop Deployment\GitHubDesktopDeploymentTool.exe
      InstalledCheckScript: Test-Path -LiteralPath 'C:\Program Files\GitHub Desktop\GitHubDesktop.exe'
      Version: latest
      Arguments: -s
      PatchOnly: false
